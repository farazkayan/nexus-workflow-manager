<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Add to Nexus</title>
  <style>
    :root {
      --bg: #0D0D10; --surface: #111116; --surface2: #18181B;
      --border: #1E1E24; --border2: #27272A;
      --accent: #6366F1; --accent-hover: #4F46E5;
      --text: #FAFAFA; --text2: #A1A1AA; --text3: #52525B;
      --success: #22C55E; --error: #EF4444;
    }
    body {
      margin: 0; padding: 0; width: 100%; height: 100vh;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; flex-direction: column; overflow-x: hidden;
    }
    
    /* HEADER */
    .header {
      height: 44px; background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; flex-shrink: 0;
    }
    .header-icon {
      width: 20px; height: 20px; background: var(--accent);
      border-radius: 4px; display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 13px; color: white; margin-right: 8px;
    }
    .header-title { font-size: 13px; font-weight: 600; color: var(--text); }

    /* ERROR STATE */
    .error-state {
      display: none; flex-direction: column; align-items: center;
      padding: 40px 20px; text-align: center;
      flex: 1; justify-content: center;
    }
    .error-icon { font-size: 28px; margin-bottom: 12px; }
    .error-title-text { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
    .error-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
    .btn-close {
      background: transparent; border: 1px solid var(--border2);
      color: var(--text); padding: 6px 16px; border-radius: 6px; cursor: pointer;
    }
    .btn-close:hover { background: var(--surface2); }

    /* CONTENT */
    .content-area {
      display: flex; flex-direction: column; flex: 1; overflow: hidden;
    }
    .info-box {
      padding: 16px; border-bottom: 1px solid var(--border); background: var(--surface);
    }
    .info-title { font-size: 11px; font-weight: 600; color: var(--text3); margin-bottom: 4px; letter-spacing: 0.05em; }
    .url-text { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .search-container { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .search-input {
      width: 100%; box-sizing: border-box; background: var(--surface2);
      border: 1px solid var(--border2); border-radius: 6px; padding: 8px 12px;
      color: var(--text); font-size: 13px; outline: none; transition: border-color 150ms;
    }
    .search-input:focus { border-color: var(--accent); }

    .list { flex: 1; overflow-y: auto; padding-bottom: 12px; padding-top: 8px; }
    .list::-webkit-scrollbar { width: 6px; }
    .list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    
    .card {
      height: 48px; border-radius: 8px; background: var(--surface);
      border: 1px solid var(--border); margin: 0 12px 6px;
      display: flex; align-items: center; cursor: pointer; transition: all 150ms;
    }
    .card:hover { border-color: var(--accent); background: var(--surface2); }
    .card.added { border-color: var(--success); background: rgba(34, 197, 94, 0.1); pointer-events: none; }
    .c-emoji { font-size: 18px; padding-left: 12px; font-family: "Segoe UI Emoji", sans-serif; }
    .c-name { font-size: 13px; font-weight: 500; flex: 1; padding-left: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
    
    .empty-state { text-align: center; padding: 20px; color: var(--text3); font-size: 13px; display: none; }

    .footer {
      padding: 12px 16px; border-top: 1px solid var(--border); background: var(--surface);
      display: flex; justify-content: flex-end;
    }
    .btn-cancel {
      background: transparent; border: none; color: var(--text2);
      font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .btn-cancel:hover { color: var(--text); }
  </style>
</head>

  </div>

  <div class="error-state" id="error-state">
    <div class="error-icon">🔌</div>
    <div class="error-title-text">Nexus isn't running</div>
    <div class="error-sub">Open Nexus from your desktop to connect.</div>
    <button class="btn-close" id="btn-close">Close</button>
  </div>

  <div class="content-area" id="content-area">
    <div class="info-box">
      <div class="info-title">ADDING LINK</div>
      <div class="url-text" id="url-display"></div>
    </div>
    <div class="search-container">
      <input type="text" id="search-input" class="search-input" placeholder="Search workflows...">
    </div>
    <div class="list" id="list">
       <div class="empty-state" id="empty-state">No workflows found.</div>
    </div>
    <div class="footer">
      <button class="btn-cancel" id="btn-cancel">Cancel</button>
    </div>
  </div>
